<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tech | Client Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-top: 0; }
        .dashboard-shell { max-width: 1200px; margin: 0 auto; padding: 40px 20px 70px; }
        .dashboard-top { display: flex; justify-content: space-between; gap: 20px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 28px; }
        .project-grid { display: grid; gap: 24px; }
        .project-card { padding: 26px; }
        .project-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 18px; }
        .status-pill { padding: 8px 14px; border-radius: 999px; font-size: 0.85rem; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; }
        .progress-wrap { margin: 18px 0; }
        .progress-bar { width: 100%; height: 12px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FFD700, #ffb800); border-radius: 999px; }
        .project-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin: 18px 0; }
        .meta-box { padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
        .section-block { margin-top: 22px; }
        .milestone-list, .file-list { display: grid; gap: 12px; margin-top: 12px; }
        .milestone-item, .file-item { padding: 14px 16px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
        .milestone-item i { margin-right: 10px; }
        .portal-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
    </style>
</head>
<body class="bg-darker text-main">
    <div class="dashboard-shell">
        <div class="dashboard-top">
            <div>
                <p class="text-gold" style="font-weight: 700; margin-bottom: 10px;">Client Portal</p>
                <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Welcome, <span id="clientNameDisplay">Client</span></h1>
                <p class="text-muted">Monitor progress, review milestones, and download project deliverables in one place.</p>
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <button onclick="fetchDashboardData()" class="btn btn-outline"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button onclick="logout()" class="btn btn-primary"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="stats-grid" id="portalStats"></div>
        <div id="projectsContainer" class="project-grid">
            <div class="glass-card project-card text-center"><i class="fas fa-spinner fa-spin"></i> Loading your workspace...</div>
        </div>
    </div>

    <script>
        const projectsContainer = document.getElementById('projectsContainer');
        const portalStats = document.getElementById('portalStats');

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('orbitClientToken');
            const username = localStorage.getItem('orbitClientUser');
            if (!token) {
                window.location.href = 'client-login.html';
                return;
            }
            if (username) document.getElementById('clientNameDisplay').textContent = username;
            fetchDashboardData();
        });

        function logout() {
            localStorage.removeItem('orbitClientToken');
            localStorage.removeItem('orbitClientUser');
            window.location.href = 'client-login.html';
        }

        function formatDate(value) {
            if (!value) return 'Not set';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleDateString();
        }

        function getStatusMeta(status) {
            if (status === 'Completed') return { color: '#28a745', icon: 'fa-check-circle' };
            if (status === 'In Progress') return { color: '#FFD700', icon: 'fa-hammer' };
            if (status === 'Review') return { color: '#4da3ff', icon: 'fa-eye' };
            return { color: '#b3b3b3', icon: 'fa-clock' };
        }

        async function fetchDashboardData() {
            try {
                const token = localStorage.getItem('orbitClientToken');
                const res = await fetch('/api/client/dashboard', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }

                if (!res.ok) {
                    projectsContainer.innerHTML = '<div class="glass-card project-card text-center">Failed to load your workspace. Please try again later.</div>';
                    return;
                }

                const projects = await res.json();
                renderStats(projects);
                renderProjects(projects);
            } catch (error) {
                console.error(error);
                projectsContainer.innerHTML = '<div class="glass-card project-card text-center">Connection error. Please refresh and try again.</div>';
            }
        }

        function renderStats(projects) {
            const totalProjects = projects.length;
            const activeProjects = projects.filter(project => project.status !== 'Completed').length;
            const completedProjects = projects.filter(project => project.status === 'Completed').length;
            const totalFiles = projects.reduce((sum, project) => sum + ((project.files || []).length), 0);
            const averageProgress = totalProjects ? Math.round(projects.reduce((sum, project) => sum + Number(project.progress || 0), 0) / totalProjects) : 0;

            portalStats.innerHTML = [
                { label: 'Active Projects', value: activeProjects, icon: 'fa-briefcase' },
                { label: 'Average Progress', value: averageProgress + '%', icon: 'fa-chart-line' },
                { label: 'Completed Projects', value: completedProjects, icon: 'fa-check-double' },
                { label: 'Deliverables Ready', value: totalFiles, icon: 'fa-folder-open' }
            ].map(stat =>
                '<div class="glass-card project-card">' +
                    '<div class="text-gold" style="font-size:1.2rem; margin-bottom:10px;"><i class="fas ' + stat.icon + '"></i></div>' +
                    '<div style="font-size:2rem; font-weight:700;">' + stat.value + '</div>' +
                    '<div class="text-muted">' + stat.label + '</div>' +
                '</div>'
            ).join('');
        }

        function renderProjects(projects) {
            if (!projects.length) {
                projectsContainer.innerHTML = '<div class="glass-card project-card text-center"><i class="fas fa-clipboard-check text-gold" style="font-size:3rem; margin-bottom:20px;"></i><h3>No Active Projects</h3><p class="text-muted mt-2">You currently have no active projects assigned. Contact Orbit Tech if this looks incorrect.</p></div>';
                return;
            }

            projectsContainer.innerHTML = projects.map(project => {
                const statusMeta = getStatusMeta(project.status);
                const progressValue = Math.max(0, Math.min(100, Number(project.progress || 0)));
                const milestones = Array.isArray(project.milestones) ? project.milestones : [];
                const files = Array.isArray(project.files) ? project.files : [];
                const fileHtml = files.length
                    ? files.map(file => '<a class="file-item" href="/' + file.path + '" target="_blank"><strong><i class="fas fa-file-download text-gold"></i> ' + file.originalName + '</strong><br><span class="text-muted" style="font-size:0.9rem;">Uploaded ' + formatDate(file.uploadedAt) + '</span></a>').join('')
                    : '<div class="file-item text-muted">No deliverables uploaded yet.</div>';
                const milestoneHtml = milestones.length
                    ? milestones.map((milestone, index) => '<div class="milestone-item"><i class="fas ' + (index < Math.round((progressValue / 100) * milestones.length) ? 'fa-check-circle text-gold' : 'fa-circle text-muted') + '"></i>' + milestone + '</div>').join('')
                    : '<div class="milestone-item text-muted">No milestones shared yet.</div>';

                return '<div class="glass-card project-card">' +
                    '<div class="project-head">' +
                        '<div><h2 style="margin-bottom:8px;">' + project.projectName + '</h2><p class="text-muted">' + (project.projectSummary || 'Your project workspace is active. Updates from Orbit Tech will appear here.') + '</p></div>' +
                        '<span class="status-pill" style="background:' + statusMeta.color + '20; color:' + statusMeta.color + ';"><i class="fas ' + statusMeta.icon + '"></i> ' + project.status + '</span>' +
                    '</div>' +
                    '<div class="progress-wrap">' +
                        '<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><strong>Progress</strong><span class="text-gold" style="font-weight:700;">' + progressValue + '%</span></div>' +
                        '<div class="progress-bar"><div class="progress-fill" style="width:' + progressValue + '%;"></div></div>' +
                    '</div>' +
                    '<div class="project-meta">' +
                        '<div class="meta-box"><strong>Start Date</strong><br><span class="text-muted">' + formatDate(project.startDate) + '</span></div>' +
                        '<div class="meta-box"><strong>Due Date</strong><br><span class="text-muted">' + formatDate(project.dueDate) + '</span></div>' +
                        '<div class="meta-box"><strong>Next Step</strong><br><span class="text-muted">' + (project.nextStep || 'Awaiting next internal update') + '</span></div>' +
                        '<div class="meta-box"><strong>Last Updated</strong><br><span class="text-muted">' + formatDate(project.lastUpdated || project.timestamp) + '</span></div>' +
                    '</div>' +
                    '<div class="section-block"><h3>Milestones</h3><div class="milestone-list">' + milestoneHtml + '</div></div>' +
                    '<div class="section-block"><h3>Deliverables</h3><div class="file-list">' + fileHtml + '</div></div>' +
                    '<div class="portal-actions">' +
                        '<a href="index.html#contact" class="btn btn-outline">Contact Orbit Tech</a>' +
                        '<a href="https://wa.me/2348106932689" target="_blank" class="btn btn-primary">Message on WhatsApp</a>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
    </script>
</body>
</html>
