<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tech | Client Portal Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(10,10,10,1) 0%, rgba(30,30,30,1) 100%);
            padding: 20px;
        }
        .client-login-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            border-top: 4px solid var(--color-gold);
        }
        .client-login-card img {
            max-height: 60px;
            margin-bottom: 20px;
        }
        .client-login-card p {
            margin-bottom: 30px;
        }
    </style>
</head>
<body class="bg-darker text-main">

    <div class="login-page">
        <div class="glass-card client-login-card hover-lift">
            <img src="Enoch.png" alt="Orbit Tech Logo" onerror="this.src='https://placehold.co/120x40/000000/FFD700?text=Orbit+Tech';">
            <h2 class="text-gold">Client Portal</h2>
            <p class="text-muted">Log in to track your project progress and access secure deliverables.</p>
            
            <form id="clientLoginForm" class="quote-form">
                <div class="form-group text-left" style="text-align: left;">
                    <label for="username">Client ID / Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                <div class="form-group text-left" style="text-align: left;">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-4" style="padding: 15px; font-size: 1.1rem;">
                    Access Dashboard <i class="fas fa-arrow-right"></i>
                </button>
                <p id="loginStatus" class="form-status mt-3 text-gold"></p>
            </form>
            
            <div style="margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 15px;">
                <p class="text-muted" style="margin-bottom: 10px;">New Client?</p>
                <a href="client-signup.html" class="text-gold" style="font-weight: 600;"><i class="fas fa-user-plus"></i> Create an Account</a>
            </div>

            <div style="margin-top: 15px;">
                <a href="index.html" class="text-muted" style="font-size: 0.9rem;"><i class="fas fa-home"></i> Return to Main Website</a>
            </div>
        </div>
    </div>

    <script>
        const clientLoginForm = document.getElementById('clientLoginForm');
        const loginStatus = document.getElementById('loginStatus');

        clientLoginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            loginStatus.innerHTML = 'Authenticating... <i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/api/client/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('orbitClientToken', data.token);
                    localStorage.setItem('orbitClientUser', data.client.username);
                    loginStatus.innerHTML = 'Secure Connection Established. Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'client-dashboard.html';
                    }, 1000);
                } else {
                    const err = await res.json();
                    loginStatus.innerHTML = err.error || 'Invalid credentials';
                }
            } catch (err) {
                console.error(err);
                loginStatus.innerHTML = 'Connection Error.';
            }
        });
    </script>
</body>
</html>
